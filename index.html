<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Water Supplier Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            text-transform: uppercase;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .results {
            display: none;
            margin-top: 30px;
        }
        
        .results.show {
            display: block;
        }
        
        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: normal;
        }
        
        .info-row {
            margin: 10px 0;
            color: #555;
            line-height: 1.6;
        }
        
        .info-row strong {
            color: #333;
            display: inline-block;
            min-width: 140px;
        }
        
        .quality-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .hardness-soft {
            background: #d4edda;
            color: #155724;
        }
        
        .hardness-hard {
            background: #fff3cd;
            color: #856404;
        }
        
        .hardness-very-hard {
            background: #f8d7da;
            color: #721c24;
        }
        
        .fluoride-yes {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .lead-alert {
            background: #fff3cd;
            border-left: 4px solid #e67700;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            color: #856404;
        }
        
        .lead-alert strong {
            color: #e67700;
        }
        
        .link {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }
        
        .link:hover {
            text-decoration: underline;
        }
        
        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            font-weight: 600;
        }
        
        .example {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💧 UK Water Supplier Lookup</h1>
        <p class="subtitle">Find your water and sewerage providers by postcode</p>
        
        <div class="search-box">
            <div style="flex: 1;">
                <input 
                    type="text" 
                    id="postcodeInput" 
                    placeholder="Enter postcode (e.g., SW1A 1AA)"
                    maxlength="10">
                <p class="example">Try: SW1A0AA, M5 0AA, or BN113BY</p>
            </div>
            <button onclick="lookupPostcode()">Search</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            Searching...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://olgqzkkubqylfhswwzmf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sZ3F6a2t1YnF5bGZoc3d3em1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxMjA3NTIsImV4cCI6MjA4MDY5Njc1Mn0.apqyKmh97veDquQDVxQg5IuFUDeNLwBlgml6s7kYyxs';

        async function lookupPostcode() {
            const input = document.getElementById('postcodeInput');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            
            let postcode = input.value.trim().toUpperCase().replace(/\s+/g, '');
            
            if (!postcode) {
                showError('Please enter a postcode');
                return;
            }
            
            loading.style.display = 'block';
            error.style.display = 'none';
            results.classList.remove('show');
            
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/rpc/lookup_water_supplier`,
                    {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ input_postcode: postcode })
                    }
                );
                
                if (!response.ok) {
                    throw new Error('Search failed');
                }
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    showError(`No supplier found for postcode: ${postcode}. Try different spacing.`);
                } else {
                    displayResults(postcode, data);
                }
                
            } catch (err) {
                showError('Error searching. Please try again.');
                console.error(err);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function displayResults(postcode, data) {
            const results = document.getElementById('results');
            const uniqueSuppliers = new Map();
            
            data.forEach(d => {
                if (!uniqueSuppliers.has(d.supplier_name)) {
                    uniqueSuppliers.set(d.supplier_name, d);
                }
            });
            
            let html = `<h2 style="margin-bottom: 20px; color: #333;">Results for: ${postcode}</h2>`;
            
            uniqueSuppliers.forEach(supplier => {
                const isWater = supplier.boundary_type.toLowerCase().includes('water');
                const isSewerage = supplier.boundary_type.toLowerCase().includes('sewerage');
                
                let title = '';
                if (isWater && isSewerage) title = '💧 Water & Sewerage';
                else if (isWater) title = '💧 Water Supplier';
                else if (isSewerage) title = '🚰 Sewerage Provider';
                
                html += createResultCard(title, supplier);
            });
            
            results.innerHTML = html;
            results.classList.add('show');
        }
        
        function createResultCard(title, supplier) {
            const isNAV = supplier.boundary_type.toLowerCase().includes('nav');
            
            let hardnessClass = '';
            if (supplier.typical_hardness) {
                if (supplier.typical_hardness.toLowerCase().includes('soft')) hardnessClass = 'hardness-soft';
                else if (supplier.typical_hardness.toLowerCase().includes('very hard')) hardnessClass = 'hardness-very-hard';
                else if (supplier.typical_hardness.toLowerCase().includes('hard')) hardnessClass = 'hardness-hard';
            }
            
            return `
                <div class="result-card">
                    <h3>
                        ${title}
                        ${isNAV ? '<span class="badge">NAV</span>' : ''}
                    </h3>
                    
                    <div class="info-row">
                        <strong>Company:</strong> ${supplier.supplier_name}
                    </div>
                    
                    ${supplier.typical_hardness ? `
                    <div class="info-row">
                        <strong>Water Hardness:</strong> 
                        <span class="quality-badge ${hardnessClass}">${supplier.typical_hardness}</span>
                        ${supplier.typical_hardness.toLowerCase().includes('soft') ? ' <span style="color: #28a745;">✓ No descaler needed</span>' : ''}
                    </div>
                    ` : ''}
                    
                    ${supplier.is_fluoridated !== null && supplier.is_fluoridated !== undefined ? `
                    <div class="info-row">
                        <strong>Fluoridated:</strong> 
                        ${supplier.is_fluoridated ? '<span class="quality-badge fluoride-yes">Yes</span>' : 'No'}
                    </div>
                    ` : ''}
                    
                    ${supplier.lead_warning ? `
                    <div class="lead-alert">
                        <strong>⚠️ Lead Pipe Alert:</strong> If your property was built before 1970, you may have lead service pipes. Consider testing your water.
                    </div>
                    ` : ''}
                    
                    ${supplier.website ? `
                    <div class="info-row" style="margin-top: 15px;">
                        <strong>Website:</strong> 
                        <a href="${supplier.website}" target="_blank" class="link">${supplier.website}</a>
                    </div>
                    ` : ''}
                    
                    ${supplier.data_url ? `
                    <div class="info-row">
                        <strong>Full Report:</strong> 
                        <a href="${supplier.data_url}" target="_blank" class="link">View Detailed Quality Report →</a>
                    </div>
                    ` : ''}
                </div>
            `;
        }
        
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }
        
        document.getElementById('postcodeInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') lookupPostcode();
        });
    </script>
</body>
</html>
